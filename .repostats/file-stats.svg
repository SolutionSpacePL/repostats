<svg xmlns="http://www.w3.org/2000/svg" width="495" height="206" viewBox="0 0 495 206" fill="none" role="img" aria-labelledby="repostats-file-statistics">
  <title id="repostats-file-statistics">File Statistics</title>
  <style>
    .card-bg { fill: #0d1117; }
    .card-border { stroke: #30363d; stroke-width: 1; fill: none; }
    .card-title { font: 600 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #c9d1d9; }
    .card-text { font: 400 12px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #c9d1d9; }
    .card-text-secondary { font: 400 11px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #8b949e; }
    .card-accent { fill: #58a6ff; }
    .card-footer { font: 400 9px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #8b949e; }
  </style>
  <rect class="card-bg card-border" x="0.5" y="0.5" width="494" height="205" rx="6" />
  <g transform="translate(20, 24)">
    <text class="card-title" x="0" y="0">File Statistics</text>
  </g>
  <line x1="20" y1="36" x2="475" y2="36" stroke="#30363d" stroke-width="0.5" />
  <g transform="translate(20, 48)">
    
      <g transform="translate(0, 0)">
        <text class="card-text-secondary" x="0" y="0">Total Files</text>
        <text class="card-text" x="0" y="18" font-size="16" font-weight="700" fill="#c9d1d9">44</text>
      </g>
    
      <g transform="translate(227.5, 0)">
        <text class="card-text-secondary" x="0" y="0">Directories</text>
        <text class="card-text" x="0" y="18" font-size="16" font-weight="700" fill="#c9d1d9">8</text>
      </g>
    
      <g transform="translate(0, 38)">
        <text class="card-text-secondary" x="0" y="0">Avg Length</text>
        <text class="card-text" x="0" y="18" font-size="16" font-weight="700" fill="#c9d1d9">60 lines</text>
      </g>
    
      <g transform="translate(227.5, 38)">
        <text class="card-text-secondary" x="0" y="0">Median Length</text>
        <text class="card-text" x="0" y="18" font-size="16" font-weight="700" fill="#c9d1d9">48 lines</text>
      </g>
    <text class="card-text-secondary" x="0" y="90" font-weight="600">Top File Types</text><text class="card-text-secondary" x="0" y="106">.ts <tspan fill="#c9d1d9">35</tspan></text><text class="card-text-secondary" x="151.66666666666666" y="106">.yml <tspan fill="#c9d1d9">4</tspan></text><text class="card-text-secondary" x="303.3333333333333" y="106">other <tspan fill="#c9d1d9">2</tspan></text><text class="card-text-secondary" x="0" y="124">.json <tspan fill="#c9d1d9">2</tspan></text><text class="card-text-secondary" x="151.66666666666666" y="124">.md <tspan fill="#c9d1d9">1</tspan></text>
  </g>
  <text class="card-footer" x="475" y="200" text-anchor="end">Generated by RepoStats</text>
